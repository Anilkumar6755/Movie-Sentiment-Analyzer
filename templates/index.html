<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Sentiment Analyzer</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
width:500px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,.2);
text-align:center;
}

h1{
color:#333;
}

textarea{
width:100%;
height:170px;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid gray;
resize:none;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:17px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Movie Sentiment Analyzer</h1>

<form action="/predict" method="POST">

<textarea
name="review"
placeholder="Enter movie review here..."
required></textarea>

<br>

<button type="submit">

Predict Sentiment

</button>

</form>

{% if prediction %}

<div class="result">

Prediction :
{{ prediction }}

</div>

{% endif %}

</div>

</body>

</html>
